name: Deploy

on:
  push:
    branches:

jobs:
  deploy_staging:
    runs-on: ubuntu-latest
    name: Deploy to staging environment
    if: github.event.pull_request.merged == true && github.ref == 'refs/heads/main'
    steps:
      - name: Check if PR has deploy label
        id: check_label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the PR associated with this commit
          PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --search "${{ github.sha }}" --state merged --json number --jq '.[0].number')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this commit"
            echo "has_label=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if the PR has the 'deploy' label
          HAS_LABEL=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json labels --jq '.labels[].name' | grep -c '^deploy$' || true)
          
          if [ "$HAS_LABEL" -gt 0 ]; then
            echo "has_label=true" >> $GITHUB_OUTPUT
          else
            echo "has_label=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check_label.outputs.has_label == 'true'
        uses: actions/checkout@v4
      
      - name: Skip deployment
        if: steps.check_label.outputs.has_label != 'true'
        run: echo "Skipping deployment - PR does not have 'deploy' label"
 
